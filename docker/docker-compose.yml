version: "3.9"

services:
  redis:
    image: redis:7.2-alpine
    container_name: feature-store-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: feature-store-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: feature-store-mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlruns
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlruns

volumes:
  redis-data:
  mlflow-data:
